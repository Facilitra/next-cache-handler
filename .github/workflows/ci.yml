name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify committed dist is up to date
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "::error::dist/ is stale - run 'pnpm build' and commit the result"
            git --no-pager diff -- dist
            exit 1
          fi

      - name: Test
        run: pnpm test

      - name: Smoke import (built ESM resolves and factory runs)
        # NEXT_PHASE forces the build-time path: no Redis client is opened, so
        # the process exits cleanly. The explicit process.exit(0) is belt-and-
        # braces in case any handle is left open.
        env:
          NEXT_PHASE: phase-production-build
        run: |
          node --input-type=module -e "
            import { createCacheHandler } from './dist/index.js';
            const h = createCacheHandler({ keyPrefix: 'ci:' });
            for (const m of ['get','set','refreshTags','getExpiration','updateTags']) {
              if (typeof h[m] !== 'function') { throw new Error('missing method: ' + m); }
            }
            // No Redis: getExpiration must fall back to memory and not throw.
            const ts = await h.getExpiration(['a','b']);
            if (ts !== 0) { throw new Error('expected 0 expiration, got ' + ts); }
            console.log('smoke ok');
            process.exit(0);
          "
